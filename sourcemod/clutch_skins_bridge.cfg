// Clutch Skins Bridge v3 — reads loadout from kgns weapons SQLite (API sync, no txt file)

clutch_skins_debug "0"
clutch_skins_refresh "0"
clutch_weapons_db "storage-local"
clutch_weapons_table_prefix ""
// 0 = glove view on your arms only (recommended). 1 can stack with default body and look doubled.
clutch_skins_gloves_world_model "0"
// 1 = web loadout during live match applies at match end (admins re-read DB each round)
clutch_skins_defer_live "1"
// 1 = full loadout sync once per match (no re-apply on death). sm_clutch_applyskins forces.
clutch_skins_once_per_match "1"
// Warmup: set clutch_skins_defer_live "0" in cfg/sourcemod/clutch_skins_bridge.cfg
